name: Epistemic Protocol Evaluate
description: Evaluate portable evidence and upload a Decision Certificate.
inputs:
  config:
    description: Path to .epistemic.yaml
    required: false
    default: .epistemic.yaml
  certificate:
    description: Certificate artifact path from the configuration
    required: false
    default: .epistemic/certificate.json
  report:
    description: Optional project report to publish with the certificate
    required: false
    default: .epistemic/project-quality.json
  endpoint:
    description: Optional Epistemic Control Center base URL
    required: false
    default: ''
  token:
    description: Project-scoped ingest token stored as a GitHub Actions secret
    required: false
    default: ''
  ai_system:
    description: Optional registered AI system ID associated with this run
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
    - name: Evaluate epistemic decision
      shell: bash
      run: |
        set -euo pipefail
        tool="$RUNNER_TEMP/epistemic-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        trap 'rm -f "$tool"' EXIT
        (cd "$GITHUB_ACTION_PATH/../.." && go build -o "$tool" ./cmd/epistemic)
        cd "$GITHUB_WORKSPACE"
        "$tool" evaluate --config "${{ inputs.config }}"
    - name: Upload Decision Certificate
      if: always() && hashFiles(inputs.certificate) != ''
      uses: actions/upload-artifact@v7
      with:
        name: epistemic-decision-certificate
        path: ${{ inputs.certificate }}
        if-no-files-found: error
    - name: Publish report and certificate to Epistemic Control Center
      if: always() && inputs.endpoint != '' && inputs.token != '' && hashFiles(inputs.certificate) != ''
      shell: bash
      env:
        EPISTEMIC_ENDPOINT: ${{ inputs.endpoint }}
        EPISTEMIC_INGEST_TOKEN: ${{ inputs.token }}
        EPISTEMIC_CERTIFICATE_PATH: ${{ inputs.certificate }}
        EPISTEMIC_REPORT_PATH: ${{ inputs.report }}
        EPISTEMIC_AI_SYSTEM_ID: ${{ inputs.ai_system }}
      run: node "$GITHUB_ACTION_PATH/publish.mjs"
