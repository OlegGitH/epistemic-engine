services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: epistemic
      POSTGRES_USER: epistemic
      POSTGRES_PASSWORD: epistemic
    ports:
      - "5432:5432"
    volumes:
      - epistemic-pg:/var/lib/postgresql/data
      - ./db/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./db/migrations/000002_portfolio.up.sql:/docker-entrypoint-initdb.d/002-portfolio.sql:ro
      - ./db/migrations/000003_project_connections.up.sql:/docker-entrypoint-initdb.d/003-project-connections.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epistemic -d epistemic"]
      interval: 5s
      timeout: 3s
      retries: 10

  control-plane:
    build:
      context: ./apps/control-plane
    environment:
      CONTROL_PLANE_ADDR: :8080
      DATABASE_URL: postgres://epistemic:epistemic@postgres:5432/epistemic?sslmode=disable
      REQUIRE_DURABLE_STORAGE: "true"
      ANALYZER_MODE: ${ANALYZER_MODE:-rules}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      EXECUTION_MODE: recorded
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_CONTROL_PLANE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - control-plane

volumes:
  epistemic-pg:
