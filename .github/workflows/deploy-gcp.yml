name: Deploy Epistemic Engine to GCP
on:
  workflow_dispatch:
    inputs:
      region:
        description: Google Cloud region
        required: true
        default: europe-west1
permissions:
  contents: read
  id-token: write
concurrency:
  group: epistemic-gcp-production
  cancel-in-progress: false
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Validate Engine
        run: go test ./...
      - name: Validate dashboard
        working-directory: apps/web
        run: npm ci && npm run build
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy Cloud Run and Cloud SQL
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ inputs.region }}
        run: bash deploy/gcp/deploy.sh
      - name: Verify public deployment
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ inputs.region }}
        run: |
          CONTROL_PLANE_URL="$(gcloud run services describe epistemic-control-plane --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.url)')"
          DASHBOARD_URL="$(gcloud run services describe epistemic-dashboard --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.url)')"
          HEALTH="$(curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors --max-time 20 "${CONTROL_PLANE_URL}/healthz")"
          jq -e '.status == "ok" and .storage == "postgresql" and .durable == true' <<<"$HEALTH"
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors --max-time 20 "$DASHBOARD_URL" >/dev/null
          {
            echo "### Deployed endpoints"
            echo "- Control plane: ${CONTROL_PLANE_URL}"
            echo "- Dashboard: ${DASHBOARD_URL}"
            echo "- Storage: PostgreSQL (durable)"
          } >> "$GITHUB_STEP_SUMMARY"
