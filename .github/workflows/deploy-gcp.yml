name: Deploy Epistemic Engine to GCP
on:
  workflow_dispatch:
    inputs:
      region:
        description: Google Cloud region
        required: true
        default: europe-west1
permissions:
  contents: read
  id-token: write
concurrency:
  group: epistemic-gcp-production
  cancel-in-progress: false
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Validate Engine
        run: go test ./...
      - name: Validate dashboard
        working-directory: apps/web
        run: npm ci && npm run build
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy Cloud Run and Cloud SQL
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ inputs.region }}
        run: bash deploy/gcp/deploy.sh
